name: Build A22X Kernel

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Samsung A22X Kernel
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Remove Broken Submodule
        run: |
          rm -f .gitmodules
          git rm --cached KernelSU 2>/dev/null || true
          rm -rf KernelSU

      - name: Setup Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make gcc git python3 \
            android-sdk-platform-tools-common libncurses5-dev libtinfo5 ccache \
            libglib2.0-dev libpixman-1-dev

      - name: Clone Toolchains
        run: |
          mkdir -p gcc clang
          git clone --depth=1 --branch gcc-4.9 https://github.com/H33CKER/toolchains gcc
          git clone --depth=1 --branch clang-12 https://github.com/H33CKER/toolchains clang

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 --branch A22 https://github.com/H33CKER/AnyKernel3.git AnyKernel3

      - name: Prepare Directories
        run: mkdir -p out output

      - name: Disable Stack Protector (Fix Compiler Error)
        run: |
          echo "→ Disabling CONFIG_CC_STACKPROTECTOR_STRONG"
          # Run defconfig first
          make O=out ARCH=arm64 a22x_defconfig
          # Disable the problematic option
          scripts/config --file out/.config --disable CC_STACKPROTECTOR_STRONG || true
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/' out/.config 2>/dev/null || true

      - name: Build Kernel
        run: |
          echo "========================================"
          echo "Starting build for a22x"
          echo "========================================"

          make O=out ARCH=arm64 -j$(nproc) \
            CC=clang/bin/clang \
            CROSS_COMPILE=gcc/bin/aarch64-linux-androidkernel- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            KBUILD_BUILD_USER=H3CKER \
            KBUILD_BUILD_HOST=H3CKED \
            2>&1 | tee build.log

      - name: Package Kernel
        run: |
          echo "→ Packaging kernel..."
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
            echo "Used: Image.gz-dtb"
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz
            echo "Used: Image.gz"
          else
            echo "❌ Kernel image not found!"
            echo "Last 30 lines of build.log:"
            tail -n 30 build.log
            exit 1
          fi

          cd AnyKernel3
          ZIP_NAME="a22x-Kernel-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../output/$ZIP_NAME" * -x "*.git*" "*.md" "README*"

          echo "✅ Package created: $ZIP_NAME"

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: a22x-Kernel
          path: output/*.zip
