name: Samsung Kernel Build

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean previous build files'
        required: false
        default: false
        type: boolean

  push:
    branches: [ main, master ]
    paths:
      - '**.sh'
      - 'config.sh'

jobs:
  build:
    name: Build Samsung Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git curl zip unzip bc bison flex make ccache \
            libncurses5 libtinfo5

      - name: Make Scripts Executable
        run: chmod +x build.sh

      - name: Clone Kernel Source
        run: |
          mkdir -p kernel
          # === Change this to your actual kernel repository ===
          git clone --depth=1 https://github.com/saidanimelek26/android_kernel_samsung_a22x.git -b master kernel

      - name: Run Build Script
        run: ./build.sh

      - name: Upload Kernel ZIP
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ZIP
          path: output/*.zip
          retention-days: 14
