name: Build A22X Kernel

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Samsung A22X Kernel
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Remove Broken Submodule
        run: |
          rm -f .gitmodules
          git rm --cached KernelSU 2>/dev/null || true
          rm -rf KernelSU

      - name: Setup Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make gcc git python3 \
            android-sdk-platform-tools-common libncurses5-dev libtinfo5 ccache \
            libglib2.0-dev libpixman-1-dev

      - name: Set Environment Variables
        run: |
          cat << EOF >> $GITHUB_ENV
          DEVICE=a22x
          DEFCONFIG=a22x_defconfig
          KBUILD_BUILD_USER=H3CKER
          KBUILD_BUILD_HOST=H3CKED
          SRC=$GITHUB_WORKSPACE
          OUT_DIR=$GITHUB_WORKSPACE/out
          ANYKERNEL_DIR=$GITHUB_WORKSPACE/AnyKernel3
          OUTPUT_DIR=$GITHUB_WORKSPACE/output
          ARCH=arm64
          CROSS_COMPILE=$GITHUB_WORKSPACE/gcc/bin/aarch64-linux-androidkernel-
          CC=$GITHUB_WORKSPACE/clang/bin/clang
          CLANG_TRIPLE=aarch64-linux-gnu-
          KCFLAGS=-w
          CONFIG_SECTION_MISMATCH_WARN_ONLY=y
          EOF

      - name: Clone Toolchains
        run: |
          mkdir -p gcc clang
          git clone --depth=1 --branch ${GCC_BRANCH:-gcc-4.9} ${GCC_URL:-https://github.com/H33CKER/toolchains} gcc
          git clone --depth=1 --branch ${CLANG_BRANCH:-clang-12} ${CLANG_URL:-https://github.com/H33CKER/toolchains} clang

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 --branch ${ANYKERNEL_BRANCH:-A22} ${ANYKERNEL_URL:-https://github.com/H33CKER/AnyKernel3.git} $ANYKERNEL_DIR

      - name: Prepare Directories
        run: mkdir -p $OUT_DIR $OUTPUT_DIR

      - name: Build Kernel
        run: |
          echo "========================================"
          echo "Starting build for ${DEVICE}"
          echo "========================================"

          make O=$OUT_DIR ARCH=arm64 $DEFCONFIG

          make -j$(nproc --all) O=$OUT_DIR \
            ARCH=arm64 \
            CC=$CC \
            CROSS_COMPILE=$CROSS_COMPILE \
            CLANG_TRIPLE=$CLANG_TRIPLE \
            KBUILD_BUILD_USER=$KBUILD_BUILD_USER \
            KBUILD_BUILD_HOST=$KBUILD_BUILD_HOST \
            2>&1 | tee $SRC/build.log

      - name: Package Kernel
        run: |
          if [ -f $OUT_DIR/arch/arm64/boot/Image.gz-dtb ]; then
            cp $OUT_DIR/arch/arm64/boot/Image.gz-dtb $ANYKERNEL_DIR/Image.gz-dtb
          elif [ -f $OUT_DIR/arch/arm64/boot/Image.gz ]; then
            cp $OUT_DIR/arch/arm64/boot/Image.gz $ANYKERNEL_DIR/Image.gz
          elif [ -f $OUT_DIR/arch/arm64/boot/Image ]; then
            cp $OUT_DIR/arch/arm64/boot/Image $ANYKERNEL_DIR/Image
          else
            echo "❌ Kernel image not found!"
            exit 1
          fi

          cd $ANYKERNEL_DIR
          ZIP_NAME="${DEVICE}-Kernel-$(date +%Y%m%d-%H%M).zip"
          zip -r9 ../output/$ZIP_NAME * -x "*.git*" "*.md" "README*"

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE }}-Kernel
          path: ${{ env.OUTPUT_DIR }}/*.zip

      # ==================== TELEGRAM NOTIFICATION ====================
      - name: Send Telegram Notification
        if: always()  # Runs even if build fails
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            *A22X Kernel Build* ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}

            Device: ${{ env.DEVICE }}
            Status: ${{ job.status }}
            Triggered by: ${{ github.actor }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            ${{ job.status == 'success' && '📦 Download from Artifacts tab' || 'Check build.log for errors' }}
          format: markdown
