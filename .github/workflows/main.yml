name: Kernel Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex g++-multilib \
          gcc-multilib git gnupg gperf lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev \
          libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
          xsltproc zip zlib1g-dev python3 python3-pip curl

      - name: Run Build Script
        run: |
          chmod +x build.sh
          ./build.sh
        env:
          KBUILD_BUILD_USER: "melek"
          KBUILD_BUILD_HOST: "GitHub-Actions"

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Package
          path: output/*.zip
